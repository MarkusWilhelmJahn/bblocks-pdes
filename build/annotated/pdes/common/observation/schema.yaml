$schema: https://json-schema.org/draft/2020-12/schema
title: InitialObservation
description: 'A SOSA ObservationCollection providing initial conditions for a simulation
  run. Each hasMember entry is a sosa:Observation (prov:Activity) generating one sosa:Result
  (prov:Entity) for one sosa:ObservableProperty.

  '
type: object
required:
- type
- featureOfInterest
- phenomenonTime
- madeBySensor
- hasMember
properties:
  type:
    const: ObservationCollection
  featureOfInterest:
    type: object
    required:
    - type
    - geometry
    properties:
      type:
        const: Feature
      geometry:
        type: object
      properties:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
    x-jsonld-id: http://www.w3.org/ns/sosa/hasFeatureOfInterest
  phenomenonTime:
    type: string
    x-jsonld-id: http://www.w3.org/ns/sosa/phenomenonTime
  madeBySensor:
    type: string
    x-jsonld-id: http://www.w3.org/ns/sosa/madeBySensor
  hasMember:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - observedProperty
      - hasResult
      - resultTime
      properties:
        observedProperty:
          type: string
          x-jsonld-id: http://www.w3.org/ns/sosa/observedProperty
          x-jsonld-type: '@id'
        hasResult:
          type: object
          required:
          - value
          properties:
            value:
              type: number
              x-jsonld-id: http://www.w3.org/ns/sosa/hasSimpleResult
            unit:
              type: string
              x-jsonld-id: http://qudt.org/schema/qudt/unit
          x-jsonld-id: http://www.w3.org/ns/sosa/hasResult
        resultTime:
          type: string
          format: date-time
          x-jsonld-id: http://www.w3.org/ns/sosa/resultTime
          x-jsonld-type: http://www.w3.org/2001/XMLSchema#dateTime
        usedProcedure:
          type: string
          x-jsonld-id: http://www.w3.org/ns/sosa/usedProcedure
          x-jsonld-type: '@id'
    x-jsonld-id: http://www.w3.org/ns/sosa/hasMember
x-jsonld-extra-terms:
  ObservationCollection: http://www.w3.org/ns/sosa/ObservationCollection
x-jsonld-prefixes:
  sosa: http://www.w3.org/ns/sosa/
  xsd: http://www.w3.org/2001/XMLSchema#
