$schema: https://json-schema.org/draft/2020-12/schema
title: JansenHostParasitoidParameters
description: >
  Jansen (1995) host-parasitoid model with density dependence:
    dN/dt = lambda·N·exp(-a·P) - N
    dP/dt = N·(1 - exp(-a·P)) - mu·P
type: object
required: [lambda, a, mu, N0, P0]
properties:
  lambda: { type: number, minimum: 0, description: "Host finite rate of increase" }
  a:      { type: number, minimum: 0, description: "Parasitoid search efficiency" }
  mu:     { type: number, minimum: 0, description: "Parasitoid survival rate" }
  N0:     { type: number, minimum: 0, description: "Initial host density" }
  P0:     { type: number, minimum: 0, description: "Initial parasitoid density" }
