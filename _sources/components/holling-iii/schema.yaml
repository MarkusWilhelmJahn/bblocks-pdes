$schema: https://json-schema.org/draft/2020-12/schema
title: HollingTypeIIIParameters
description: "f(X) = gamma·X² / (H² + X²) — sigmoid functional response"
type: object
required: [gamma, H]
properties:
  gamma: { type: number, minimum: 0, description: "Maximum consumption rate" }
  H:     { type: number, minimum: 0, description: "Half-saturation constant (inflection point)" }
